<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="img/heart.png">
    <title>Undertale Adventure - Para Karla</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html {
            background-color: black;
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: 'Press Start 2P', cursive;
            color: white; overflow: hidden;
        }

        #game-start-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: black; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }

        /* --- EFECTOS VISUALES --- */
        .shake { animation: shake-effect 0.2s ease-in-out infinite; }
        .white-flash { animation: flash-anim 0.1s steps(2) infinite; }
        
        .slide-out-left {
            animation: flowey-exit-left 2s ease-in forwards;
            opacity: 1;
        }

        @keyframes flowey-exit-left {
            from { transform: translateX(0) rotate(0deg); opacity: 1; }
            to { transform: translateX(-1200px) rotate(-360deg); opacity: 0; }
        }

        .slide-in-right {
            animation: char-appear 2s ease-out forwards;
            opacity: 0;
        }

        /* Nueva animación específica para la salida de Papyrus */
        .papyrus-exit {
            animation: papyrus-out 2s ease-in forwards !important;
            opacity: 0;
        }

        @keyframes papyrus-out {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(1000px); opacity: 0; }
        }

        .slide-out-right-fast {
            animation: char-exit-right 1.5s ease-in forwards !important;
        }

        @keyframes char-appear {
            from { transform: translateX(500%); opacity: 1; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes char-exit-right {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(500%); opacity: 0; }
        }

        /* Desplazamiento de Sans */
        .sans-shift {
            transform: translateX(-100px) !important;
            transition: transform 2s ease-out;
        }

        /* --- EFECTO DE NIEVE (CSS PURO) --- */
        #snow-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            display: none;
            background-image: 
                radial-gradient(circle, rgba(255,255,255,0.8) 2px, transparent 3px),
                radial-gradient(circle, rgba(255,255,255,0.6) 1.5px, transparent 2px),
                radial-gradient(circle, rgba(255,255,255,0.7) 2.5px, transparent 3px);
            background-size: 300px 300px, 200px 200px, 400px 400px;
            background-position: 0 0, 50px 50px, 100px 100px;
            animation: snowFall 10s linear infinite;
        }

        @keyframes snowFall {
            0% { background-position: 0px 0px, 50px 50px, 100px 100px; }
            100% { background-position: 300px 300px, 250px 250px, 500px 500px; }
        }

        #transition-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            
            /* --- CONFIGURACIÓN DE LA IMAGEN --- */
            background-color: black; 
            background-image: url('img/dog.webp'); /* RECUERDA PONER TU IMAGEN AQUÍ */
            background-repeat: repeat; 
            background-position: center; 
            background-size: 80px 80px; 
            /* ---------------------------------- */

            z-index: 300;
            transform: translateX(-100%);
            pointer-events: none;
            
            /* Ajustado a 1.5 segundos por movimiento (3s en total) con 15 pasos */
            transition: transform 1.5s steps(15, end);
        }

        /* Clase técnica para reiniciar la posición en secreto */
        .no-transition {
            transition: none !important;
        }

        @keyframes blink { 50% { opacity: 0; } }

        @keyframes shake-effect {
            0% { transform: translate(2px, 1px); }
            20% { transform: translate(-3px, 0px); }
            40% { transform: translate(1px, -1px); }
            100% { transform: translate(1px, -2px); }
        }

        /* --- TEMBLOR FUERTE --- */
        .shake-strong { animation: shake-effect-strong 0.1s ease-in-out infinite; }
        
        @keyframes shake-effect-strong {
            0% { transform: translate(10px, 10px) rotate(0deg); }
            20% { transform: translate(-10px, -10px) rotate(-2deg); }
            40% { transform: translate(-10px, 10px) rotate(2deg); }
            60% { transform: translate(10px, -10px) rotate(0deg); }
            80% { transform: translate(-5px, 5px) rotate(-1deg); }
            100% { transform: translate(5px, -5px) rotate(1deg); }
        }

        /* --- ANIMACIÓN CORAZÓN --- */
        .heart-vibrate { animation: heart-vibrate-anim 0.1s infinite; }
        @keyframes heart-vibrate-anim {
            0% { transform: translate(0,0); }
            25% { transform: translate(4px, 4px); }
            50% { transform: translate(-4px, -4px); }
            100% { transform: translate(0,0); }
        }

        .heart-break { animation: heart-shatter 0.6s forwards; }
        @keyframes heart-shatter {
            0% { transform: scale(1); filter: brightness(1); opacity: 1; }
            20% { filter: brightness(20); transform: scale(1.2); }
            100% { transform: scale(0); opacity: 0; filter: brightness(20); }
        }

        #game-scene {
            flex: 1; display: flex;
            justify-content: center; align-items: center;
            width: 100%;
            z-index: 10;
        }

        #sprites-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 40px;
            width: 90%;
            max-width: 900px;
        }

        .sprite-img { 
            width: 200px; 
            image-rendering: pixelated;
            transition: transform 0.8s ease-out, opacity 0.3s;
            display: none;
        }

        #dialogue-container {
            width: 80%; max-width: 800px;
            height: 180px; border: 6px solid white;
            padding: 20px; margin-bottom: 40px;
            background: black; box-sizing: border-box;
            cursor: pointer; position: relative;
            z-index: 20;
        }

        #text-box { font-size: 18px; line-height: 1.5; margin: 0; pointer-events: none; }

        #options-container {
            margin-top: 15px; display: flex;
            flex-wrap: wrap; gap: 20px;
        }

        .option-btn {
            background: none; border: none;
            color: white; font-family: 'Press Start 2P', cursive;
            font-size: 16px; cursor: pointer;
            display: flex; align-items: center; gap: 10px;
        }

        .option-btn:hover { color: #ffff00; }
        .option-btn::before {
            content: ''; width: 12px; height: 12px;
            background-color: #ff0000;
            clip-path: polygon(0% 20%, 20% 0%, 40% 0%, 50% 20%, 60% 0%, 80% 0%, 100% 20%, 100% 50%, 50% 100%, 0% 50%);
            visibility: hidden;
        }
        .option-btn:hover::before { visibility: visible; }

        #game-over-screen {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 200;
            flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
        }

        #game-over-heart {
            width: 40px; height: 40px;
            background-color: #ff0000;
            clip-path: polygon(0% 20%, 20% 0%, 40% 0%, 50% 20%, 60% 0%, 80% 0%, 100% 20%, 100% 50%, 50% 100%, 0% 50%);
            margin-bottom: 50px;
        }

        #game-over-text { font-size: 40px; color: white; opacity: 0; margin-bottom: 50px; width: 100%; padding-left: 20px; }

        /* --- NUEVA PANTALLA DE CUMPLEAÑOS --- */
        #birthday-screen {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 200;
            flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
        }

        #birthday-text { font-size: 40px; color: white; opacity: 0; margin-bottom: 50px; width: 100%; }

        .fade-in { animation: fadeInEffect 2s forwards; }
        @keyframes fadeInEffect { from { opacity: 0; } to { opacity: 1; } }

        #voice-sound, #bg-music, #laugh-sound, #hit-sound, #sfx-sound { display: none; }
        #game-start-overlay p { animation: blink 1.2s steps(2, start) infinite; }

        /* --- NUEVAS ANIMACIONES DE MOVIMIENTO CONTINUO --- */
        .move-left-right {
            animation: moveLR 2s infinite alternate ease-in-out;
        }
        @keyframes moveLR {
            from { transform: translateX(-30px); }
            to { transform: translateX(30px); }
        }

        .move-up-down {
            animation: moveUD 1s infinite alternate ease-in-out;
        }
        @keyframes moveUD {
            from { transform: translateY(-15px); }
            to { transform: translateY(15px); }
        }

        /* Clase para el tamaño de Mettaton */
        .mettaton-large {
            transform: scale(1.4) translateY(-15px) !important; 
            transition: transform 0.5s ease-out;
        }

        /* Overlay para el flash blanco */
        #white-flash-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            /* Controla la velocidad de desaparición aquí (2s) */
            transition: opacity 2s ease-in-out; 
        }

        #white-flash-overlay.active {
            opacity: 1;
            transition: none; /* Aparece instantáneo, desaparece lento */
        }
        
    </style>
</head>

        const optionsContainer = document.getElementById('options-container');

        const voiceSound = document.getElementById('voice-sound');

        const startOverlay = document.getElementById('game-start-overlay');
        const transOverlay = document.getElementById('transition-overlay');
        const snowOverlay = document.getElementById('snow-overlay');
        const nextIndicator = document.getElementById('next-indicator');
        const gameOverScreen = document.getElementById('game-over-screen');
        const gameOverHeart = document.getElementById('game-over-heart');
        const gameOverText = document.getElementById('game-over-text');
        const gameOverOptions = document.getElementById('game-over-options');

        // ELEMENTOS TÉCNICOS NUEVOS
        const birthdayScreen = document.getElementById('birthday-screen');
        const birthdayText = document.getElementById('birthday-text');
        const birthdayOptions = document.getElementById('birthday-options');

        startOverlay.addEventListener('click', () => {
            startOverlay.style.display = 'none';
            playDialogue('inicio');
        });

        document.getElementById('dialogue-container').addEventListener('click', () => {
            if (isTransitioning) return; // FIX: Prevenir clics accidentales en transiciones
            if (isTyping) {
                clearTimeout(typingTimeout);
                isTyping = false;
                voiceSound.pause();
                textBox.innerHTML = currentFullText.split('\n').join('<br>');
                if (activeCallback) activeCallback();
            } else if (currentNode && currentNode.next && !currentNode.options) {
                playDialogue(currentNode.next);
            }
        });

        function playDialogue(nodeId) {
            const node = storyNodes[nodeId];
            if (!node) return;
            currentNode = node;

            clearTimeout(typingTimeout); 
            clearTimeout(sfxTimeout);
            clearTimeout(customTimeout); 
            clearInterval(animationInterval); 
            clearInterval(spriteAnimLeftInterval);
            
            voiceSound.pause(); voiceSound.currentTime = 0;
            sfxSound.pause(); sfxSound.currentTime = 0;
            
            nextIndicator.style.display = 'none';
            
            // Limpiamos animaciones
            spriteLeft.classList.remove('slide-out-left', 'slide-in-right', 'white-flash', 'move-left-right', 'move-up-down');
            spriteRight.classList.remove('slide-in-right', 'slide-out-right-fast', 'papyrus-exit');
            
            // TRUCO TÉCNICO: Forzar Reflow para que las animaciones de CSS se reinicien siempre sin glitch visual
            void spriteLeft.offsetWidth;
            void spriteRight.offsetWidth;

            // FIX: Se incluye 'puzzle' para evitar que Sans salte al centro bruscamente durante esa sección
            if (!nodeId.includes('sans') && !nodeId.includes('papyrus') && !nodeId.includes('aparicion_papyrus') && !nodeId.includes('puzzle')) {
                spriteLeft.classList.remove('sans-shift');
                spriteLeft.style.transform = ''; 
            }

            if (nodeId.includes('snowdin') || nodeId.includes('sans') || nodeId.includes('papyrus') || nodeId.includes('puzzle')) {
                snowOverlay.style.display = 'block';
            } else {
                snowOverlay.style.display = 'none';
            }

            if (node.onEnter) node.onEnter();

            optionsContainer.innerHTML = '';
            textBox.innerHTML = '';

            // --- LÓGICA REPARADA DE SPRITES ---
            // 1. Control del Sprite Derecho (Papyrus / Alphys)
            if (node.spritePapyrus) {
                spriteRight.style.display = "block";
                spriteRight.src = node.spritePapyrus;
            } else {
                spriteRight.style.display = "none";
            }

            // Dentro de playDialogue, después de las limpiezas de clases:
            if (nodeId.includes('mtt_') || nodeId.includes('alphys_nuevo') || nodeId.includes('mtt_juego')) {
                spriteLeft.classList.add('mettaton-large');
            } else {
                spriteLeft.classList.remove('mettaton-large');
            }

            // 2. Control del Sprite Izquierdo (Animado o Estático)
            if (node.animSpritesLeft && node.animSpritesLeft.length > 0) {
                spriteLeft.style.display = "block";
                let currentFrame = 0;
                spriteLeft.src = node.animSpritesLeft[currentFrame];
                
                let speed = node.animSpeedLeft || 300;
                spriteAnimLeftInterval = setInterval(() => {
                    currentFrame = (currentFrame + 1) % node.animSpritesLeft.length;
                    spriteLeft.src = node.animSpritesLeft[currentFrame];
                }, speed);
            } else if (node.spriteSans) {
                spriteLeft.style.display = "block";
                spriteLeft.src = node.spriteSans;
            } else if (node.sprite) {
                spriteLeft.style.display = "block";
                spriteLeft.src = node.sprite;
            } else {
                spriteLeft.style.display = "none";
            }

            // 3. Control de clases de movimiento continuo
            if (node.moveClassLeft) {
                spriteLeft.classList.add(node.moveClassLeft);
            }
            // ----------------------------------
            
            updateMusic(node.music);
            if(node.voice) voiceSound.src = node.voice;

            if (node.soundEffect) {
                const delay = node.soundDelay || 0;
                sfxTimeout = setTimeout(() => {
                    sfxSound.src = node.soundEffect;
                    sfxSound.play().catch(e => {});
                }, delay);
            }
            
            if(node.text) {
                typeWriter(node.text, 0, () => {
                    if (node.options) {
                        showOptions(node.options, optionsContainer);
                    } else if (node.next) {
                        nextIndicator.style.display = 'block';
                    }
                });
            }
        }

        function updateMusic(musicPath) {
            if (!musicPath || musicPath === "") { bgMusic.pause(); currentMusicPath = ""; return; }
            if (currentMusicPath === musicPath) return;
            currentMusicPath = musicPath;
            bgMusic.src = musicPath;
            bgMusic.play().catch(e => {});
        }

        function typeWriter(text, i, callback) {
            isTyping = true;
            currentFullText = text;
            activeCallback = callback;
            if (i < text.length) {
                if (text.charAt(i) !== '*' && text.charAt(i) !== ' ' && text.charAt(i) !== '\n') {
                    voiceSound.currentTime = 0;
                    voiceSound.play().catch(e => {});
                }
                textBox.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                typingTimeout = setTimeout(() => typeWriter(text, i + 1, callback), typingSpeed);
            } else {
                isTyping = false;
                if (callback) callback();
            }
        }

        function showOptions(options, container, isOverlay = false) {
            if(!options) return;
            container.innerHTML = '';
            options.forEach(opt => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.innerText = opt.label;
                if(isOverlay) button.style.margin = "0 auto";
                button.onclick = (e) => {
                    e.stopPropagation();
                    if (isTransitioning) return; 
                    container.innerHTML = ''; 
                    
                    // Lógica técnica corregida: se ocultan pantallas de superposición siempre que el flag esté activo
                    if (isOverlay) {
                        gameOverScreen.style.display = 'none';
                        birthdayScreen.style.display = 'none'; 
                        gameOverHeart.classList.remove('heart-break', 'heart-vibrate');
                        gameOverText.classList.remove('fade-in'); 
                        birthdayText.classList.remove('fade-in');
                        document.getElementById('dialogue-container').style.display = 'block'; 
                    }

                    if (opt.transition) {
                        triggerWhiteTransition(opt.next);
                    } else if (!isTyping) {
                        playDialogue(opt.next);
                    }
                };
                container.appendChild(button);
            });
        }

        function triggerWhiteTransition(nextNode) {
            if (isTransitioning) return;
            isTransitioning = true;
            
            // FASE 1: La cortina negra entra desde la izquierda a tirones
            transOverlay.classList.remove('no-transition');
            transOverlay.style.transform = "translateX(0)"; 
            
            // Esperamos 1500ms (1.5s) a que termine de entrar
            setTimeout(() => {
                playDialogue(nextNode); // Cambiamos la escena en secreto
                
                // Le damos 300ms de pausa con la pantalla completamente cubierta
                setTimeout(() => { 
                    // FASE 2: La cortina sigue su camino y sale por la derecha
                    transOverlay.style.transform = "translateX(100%)"; 
                    
                    // Esperamos 1500ms (1.5s) a que termine de salir de la pantalla
                    setTimeout(() => {
                        // Reseteamos la posición a la izquierda SIN animación para la próxima vez
                        transOverlay.classList.add('no-transition');
                        transOverlay.style.transform = "translateX(-100%)"; 
                        
                        // Pequeño delay técnico para asegurar que el navegador lo aplique
                        setTimeout(() => {
                            isTransitioning = false;
                        }, 50);
                    }, 1500);
                    
                }, 300);
            }, 1500); 
        }

        function startGameOverSequence() {
            clearTimeout(typingTimeout);
            clearTimeout(sfxTimeout);
            clearTimeout(customTimeout);
            clearInterval(animationInterval); 

            gameOverScreen.style.display = 'flex';
            gameOverOptions.innerHTML = ''; 
            gameOverText.style.opacity = "0";
            gameOverText.classList.remove('fade-in');
            gameOverHeart.style.opacity = "1";
            gameOverHeart.style.filter = "brightness(1)";
            gameOverHeart.style.transform = "scale(1)";
            gameOverHeart.classList.remove('heart-vibrate', 'heart-break'); 
            
            document.getElementById('laugh-sound').pause();
            document.body.classList.remove('shake');
            spriteLeft.classList.remove('white-flash', 'sans-shift');
            spriteRight.classList.remove('slide-in-right', 'slide-out-right-fast', 'papyrus-exit');
            bgMusic.pause();
            
            document.getElementById('soul-appear-sound').play().catch(e => {});
            gameOverHeart.classList.add('heart-vibrate');

            // FIX: Asignar a customTimeout evita bugs si el usuario de alguna forma fuerza salir
            customTimeout = setTimeout(() => {
                gameOverHeart.classList.remove('heart-vibrate');
                gameOverHeart.classList.add('heart-break');
                document.getElementById('break-sound').play().catch(e => {});

                customTimeout = setTimeout(() => {
                    gameOverText.classList.add('fade-in');
                    updateMusic("sounds/mus_gameover.mp3");
                    showOptions([{ label: "REINTENTAR", next: "inicio" }], gameOverOptions, true);
                }, 2000); 
            }, 1000);
        }

        // LÓGICA TÉCNICA NUEVA: SECUENCIA DE CUMPLEAÑOS
        function startBirthdaySequence() {
            clearTimeout(typingTimeout);
            clearTimeout(sfxTimeout);
            clearInterval(animationInterval); 

            birthdayScreen.style.display = 'flex';
            birthdayOptions.innerHTML = ''; 
            birthdayText.style.opacity = "0";
            birthdayText.classList.remove('fade-in');

            // Ocultamos la caja de diálogo para reemplazarla con la nueva pantalla
            document.getElementById('dialogue-container').style.display = 'none';

            customTimeout = setTimeout(() => {
                birthdayText.classList.add('fade-in');
                showOptions([{ label: "VOLVER A EMPEZAR", next: "inicio", transition: true }], birthdayOptions, true);
            }, 1500); 
        }
    </script>
</body>
</html>
