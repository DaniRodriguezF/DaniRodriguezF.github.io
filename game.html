<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="img/heart.png">
    <title>Undertale Karla</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <button id="fullscreen-btn" title="Pantalla Completa">⛶</button>

    <div id="snow-overlay"></div>
    <div id="transition-overlay"></div>
    <div id="white-flash-overlay"></div>

    <div id="game-start-overlay">
        <p>[ CLICK PARA CONTINUAR ]</p>
    </div>

    <div id="game-scene">
        <div id="sprites-container">
            <img id="sprite-left" class="sprite-img" src="" alt="">
            <img id="sprite-right" class="sprite-img" src="" alt="">
        </div>
    </div>

    <div id="dialogue-container">
        <p id="text-box"></p>
        <div id="next-indicator"></div>
        <div id="options-container"></div>
    </div>

    <div id="game-over-screen">
        <div id="game-over-heart"></div>
        <h1 id="game-over-text">GAME OVER</h1>
        <div id="game-over-options"></div>
    </div>

    <div id="birthday-screen">
        <h1 id="birthday-text">¡¡FELIZ CUMPLEAÑOS!!</h1>
        <div id="birthday-options"></div>
    </div>

    <audio id="voice-sound"></audio>
    <audio id="bg-music" loop></audio>
    <audio id="break-sound" src="sounds/snd_break1.mp3"></audio>
    <audio id="soul-appear-sound" src="sounds/snd_death.mp3"></audio>
    <audio id="laugh-sound" src="sounds/snd_floweyL.mp3"></audio>
    <audio id="hit-sound" src="sounds/snd_floweyhit.mp3"></audio>
    <audio id="sfx-sound"></audio>

    <script src="js/script.js"></script>
</body>
</html>
