<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="img/heart.png">
    <title>Para Karlangas</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            background-color: black;
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            color: white;
        }

        /* --- 1. FONDO DEL MENÚ (1280x960) --- */
        body.main-menu-visible {
            background-image: url('img/background.png');
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            image-rendering: pixelated; 
            transition: background-image 0.8s steps(4);
        }

        /* --- 2. PANTALLA DE INICIO --- */
        #start-screen {
            text-align: center;
            cursor: pointer;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .start-option {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #start-screen p {
            font-size: 18px;
            margin: 0;
            letter-spacing: 2px;
            animation: blink 1.2s steps(2, start) infinite; 
        }

        /* --- 3. CONTENEDOR DE LA INTRO (IMÁGENES) --- */
        #intro-container {
            display: none;
            width: 90%;
            max-width: 900px;
            justify-content: center;
            align-items: center;
        }

        #intro-image {
            max-width: 100%;
            height: auto;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            image-rendering: pixelated; 
        }

        /* --- 4. MENÚ PRINCIPAL (DISEÑO RPG) --- */
        #main-menu-container {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .menu-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px; 
            margin-top: -60px;
        }

        .options-list {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 35px;
            padding-bottom: 60px;
            padding-left: 50px;
        }

        .menu-option {
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding-right: 45px;
            position: relative;
            transition: color 0.2s ease;
            letter-spacing: 2px;
        }

        .menu-option .heart {
            visibility: hidden; 
            position: absolute;
            left: -45px;
            width: 24px;
            height: 24px;
            background-color: #ff0000;
            clip-path: polygon(0% 20%, 20% 0%, 40% 0%, 50% 20%, 60% 0%, 80% 0%, 100% 20%, 100% 50%, 50% 100%, 0% 50%);
            animation: pulse 0.6s infinite alternate;
        }

        .menu-option:hover { color: #ffff00; }
        .menu-option:hover .heart { visibility: visible; }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        @keyframes blink { to { visibility: hidden; } }

        .visible { opacity: 1 !important; }

        /* --- BOTÓN PANTALLA COMPLETA --- */
        #fullscreen-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            background: transparent;
            color: white;
            border: none;
            font-size: 24px;
            opacity: 0.2;
            cursor: pointer;
            transition: opacity 0.3s ease;
            font-family: Arial, sans-serif;
        }

        #fullscreen-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <button id="fullscreen-btn" title="Pantalla Completa">⛶</button>

    <div id="start-screen">
        <div class="start-option">
            <div class="heart"></div>
            <p>[ CLICK PARA COMENZAR ]</p>
            <div class="heart"></div>
        </div>
    </div>

    <div id="intro-container">
        <img id="intro-image" src="" alt="">
    </div>

    <div id="main-menu-container">
        <div class="menu-content">
            <div class="options-list">
                <div class="menu-option">
                    <div class="heart"></div>
                    <span>COMENZAR</span>
                </div>
                <div class="menu-option">
                    <div class="heart"></div>
                    <span>CREDITOS</span>
                </div>
            </div>
        </div>
    </div>

    <audio id="intro-sound" src="sounds/INTROSOUND.mp3"></audio>
    <audio id="hover-sound" src="sounds/sound_menu.mp3"></audio>
    <audio id="bg-music" src="sounds/mus_menu0.ogg" loop></audio>

    <script>
        const imagenes = ['img/1titulo.png', 'img/2titulo.png', 'img/3titulo.png'];
        const tiempoVisible = 2500;
        const tiempoFade = 1200;

        const introImage = document.getElementById('intro-image');
        const introSound = document.getElementById('intro-sound');
        const hoverSound = document.getElementById('hover-sound');
        const bgMusic = document.getElementById('bg-music');
        const startScreen = document.getElementById('start-screen');
        const introContainer = document.getElementById('intro-container');
        const mainMenuContainer = document.getElementById('main-menu-container');
        const body = document.body;
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        
        let index = 0;

        // --- LÓGICA PANTALLA COMPLETA ---
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch((err) => {
                    console.log(`Error: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        startScreen.addEventListener('click', () => {
            startScreen.style.display = 'none';
            introContainer.style.display = 'flex';
            mostrarSecuencia();
        });

        function mostrarSecuencia() {
            if (index < imagenes.length) {
                introImage.src = imagenes[index];
                introImage.onload = () => {
                    introImage.classList.add('visible');
                    introSound.currentTime = 0; 
                    introSound.play().catch(e => console.log("Audio bloqueado:", e));
                    
                    setTimeout(() => {
                        introImage.classList.remove('visible');
                        setTimeout(() => {
                            index++;
                            mostrarSecuencia();
                        }, tiempoFade);
                    }, tiempoVisible);
                };
            } else {
                showMainMenu();
            }
        }

        function showMainMenu() {
            introContainer.style.display = 'none';
            body.classList.add('main-menu-visible');
            mainMenuContainer.style.display = 'flex';
            bgMusic.play().catch(e => console.log("Música bloqueada:", e));
            initMenuInteractions();
        }

        function initMenuInteractions() {
            const options = document.querySelectorAll('.menu-option');
            options.forEach((option, i) => {
                option.addEventListener('mouseenter', () => {
                    hoverSound.currentTime = 0;
                    hoverSound.play().catch(e => console.log("Error de audio:", e));
                });

                option.addEventListener('click', () => {
                    if (i === 0) {
                        window.location.href = 'game.html'; 
                    } else if (i === 1) {
                        alert("¡Próximamente!");
                    }
                });
            });
        }
    </script>
</body>
</html>
