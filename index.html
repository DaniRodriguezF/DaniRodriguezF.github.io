<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="img/heart.png">
    <title>Para Karlangas</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index_style.css">
</head>
<body>

    <button id="fullscreen-btn" title="Pantalla Completa">⛶</button>

    <div id="start-screen">
        <div class="start-option">
            <div class="heart"></div>
            <p>[ CLICK PARA COMENZAR ]</p>
            <div class="heart"></div>
        </div>
    </div>

    <div id="intro-container">
        <img id="intro-image" src="" alt="">
    </div>

    <div id="main-menu-container">
        <div class="menu-content">
            <div class="options-list">
                <div class="menu-option">
                    <div class="heart"></div>
                    <span>COMENZAR</span>
                </div>
                <div class="menu-option">
                    <div class="heart"></div>
                    <span>CREDITOS</span>
                </div>
            </div>
        </div>
    </div>

    <audio id="intro-sound" src="sounds/INTROSOUND.mp3"></audio>
    <audio id="hover-sound" src="sounds/sound_menu.mp3"></audio>
    <audio id="bg-music" src="sounds/mus_menu0.ogg" loop></audio>

    <script src="js/index_script.js"></script>
</body>
</html>
